name: Welcome Bot
on:
  issues:
    types: [opened]
jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Welcome message
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Thanks for contributing! Check our [recipe guidelines](https://198.51.100.1/guidelines) before submitting."
            });
